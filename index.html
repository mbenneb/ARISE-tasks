<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARISE Team Task Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EB;
    --bg2: #EDEAE0;
    --bg3: #E4E0D4;
    --card: #FAFAF7;
    --ink: #1C1B18;
    --ink2: #5A5850;
    --ink3: #908E86;
    --accent: #2D5A3D;
    --accent-light: #E8F0EA;
    --red: #A02020;
    --red-light: #F7EBEB;
    --border: rgba(28,27,24,0.12);
    --radius: 10px;
    --shadow: 0 1px 3px rgba(28,27,24,0.08), 0 4px 16px rgba(28,27,24,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--ink); min-height: 100vh; }
  header {
    background: var(--ink); color: #F5F2EB;
    padding: 18px 32px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .logo span { color: #A8C8A8; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
    background: transparent; color: #F5F2EB; transition: all 0.15s; letter-spacing: 0.02em;
  }
  .btn:hover { background: rgba(255,255,255,0.1); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #245030; }
  .btn-danger { border-color: rgba(160,32,32,0.4); color: var(--red); }
  .btn-danger:hover { background: var(--red-light); }
  .btn-sm { font-size: 11px; padding: 5px 10px; }
  .tabs {
    display: flex; padding: 0 32px; background: var(--ink);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .tab {
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 10px 18px; cursor: pointer;
    color: rgba(245,242,235,0.5); border: none; background: none;
    border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab:hover { color: rgba(245,242,235,0.8); }
  .tab.active { color: #A8C8A8; border-bottom-color: #A8C8A8; }
  main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; }

  /* KANBAN — 2 columns */
  .kanban { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .column {
    background: var(--bg2); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 16px; min-height: 400px;
  }
  .col-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .col-title {
    font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .col-count {
    font-family: 'DM Mono', monospace; font-size: 10px;
    background: var(--bg3); color: var(--ink2);
    padding: 2px 7px; border-radius: 20px; border: 1px solid var(--border);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-todo { background: var(--ink3); }
  .dot-done { background: var(--accent); }
  .task-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 13px 14px; margin-bottom: 10px; cursor: pointer;
    transition: all 0.15s; box-shadow: var(--shadow); position: relative;
  }
  .task-card:hover { border-color: rgba(28,27,24,0.25); transform: translateY(-1px); }
  .task-card.done { opacity: 0.55; }
  .task-title {
    font-size: 13px; font-weight: 500; margin-bottom: 8px;
    line-height: 1.45; padding-right: 28px;
  }
  .task-card.done .task-title { text-decoration: line-through; color: var(--ink2); }
  .task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .assignee-bubble {
    font-size: 10px; font-weight: 500; width: 24px; height: 24px; border-radius: 50%;
    background: var(--bg3); color: var(--ink2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .task-date { font-size: 10px; color: var(--ink3); margin-left: auto; }
  .check-btn {
    position: absolute; top: 11px; right: 10px; width: 22px; height: 22px;
    border-radius: 50%; border: 1.5px solid var(--border); background: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; color: transparent; font-size: 12px;
  }
  .check-btn:hover { border-color: var(--accent); color: var(--accent); }
  .task-card.done .check-btn { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* LIST VIEW */
  .list-view { display: flex; flex-direction: column; gap: 8px; }
  .list-filters {
    display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center;
  }
  .filter-select, .filter-input {
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 7px 12px;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--ink); outline: none;
  }
  .filter-select:focus, .filter-input:focus { border-color: rgba(28,27,24,0.3); }
  .filter-input { min-width: 200px; }
  .list-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; display: grid;
    grid-template-columns: 28px 1fr auto auto;
    align-items: center; gap: 12px; transition: all 0.15s; cursor: pointer;
  }
  .list-item:hover { border-color: rgba(28,27,24,0.25); }
  .list-item.done { opacity: 0.55; }
  .list-item.done .li-title { text-decoration: line-through; color: var(--ink2); }
  .li-check {
    width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border);
    background: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 11px; color: transparent; transition: all 0.15s; flex-shrink: 0;
  }
  .li-check:hover { border-color: var(--accent); color: var(--accent); }
  .list-item.done .li-check { background: var(--accent); border-color: var(--accent); color: #fff; }
  .li-title { font-size: 13px; font-weight: 500; }
  .li-status { font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .s-todo { background: var(--bg3); color: var(--ink2); }
  .s-done { background: var(--accent-light); color: var(--accent); }
  .li-assignees { display: flex; gap: 4px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(28,27,24,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border-radius: 14px; padding: 28px;
    width: 100%; max-width: 500px; border: 1px solid var(--border);
    transform: translateY(8px); transition: transform 0.2s;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; margin-bottom: 22px; }
  .form-group { margin-bottom: 16px; }
  label {
    display: block; font-size: 11px; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--ink2); margin-bottom: 6px;
  }
  input[type="text"], textarea, select {
    font-family: 'DM Mono', monospace; font-size: 13px; width: 100%;
    padding: 9px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--ink); outline: none; transition: border-color 0.15s;
  }
  input[type="text"]:focus, textarea:focus, select:focus { border-color: rgba(28,27,24,0.35); }
  textarea { min-height: 80px; resize: vertical; }
  .assignee-grid {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 10px;
    background: var(--bg); border-radius: 6px; border: 1px solid var(--border);
  }
  .assignee-chip {
    font-size: 12px; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--card);
    cursor: pointer; transition: all 0.15s;
  }
  .assignee-chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
  .btn-modal {
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 9px 20px;
    border-radius: 6px; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg); color: var(--ink); transition: all 0.15s;
  }
  .btn-modal:hover { background: var(--bg2); }
  .btn-modal-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-modal-primary:hover { background: #245030; }

  /* TEAM SETTINGS */
  .settings-panel { max-width: 540px; }
  .settings-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .member-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .member-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    background: var(--card); border-radius: 8px; border: 1px solid var(--border);
  }
  .member-avatar {
    width: 34px; height: 34px; border-radius: 50%; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; color: var(--ink2); flex-shrink: 0;
  }
  .member-name { font-size: 13px; font-weight: 500; flex: 1; }
  .add-member-row { display: flex; gap: 8px; }
  .add-member-row input { flex: 1; }
  .empty { text-align: center; padding: 48px 20px; color: var(--ink3); font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
  .fab {
    position: fixed; bottom: 32px; right: 32px; width: 52px; height: 52px;
    border-radius: 50%; background: var(--ink); color: var(--bg); border: none;
    cursor: pointer; font-size: 26px; display: flex; align-items: center;
    justify-content: center; box-shadow: 0 4px 20px rgba(28,27,24,0.25);
    transition: all 0.2s; z-index: 50;
  }
  .fab:hover { background: var(--accent); transform: scale(1.05); }
  @media (max-width: 768px) {
    main { padding: 16px; }
    .kanban { grid-template-columns: 1fr; }
    header { padding: 14px 16px; }
    .tabs { padding: 0 16px; }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <div class="logo">ARISE<span>Tasks</span></div>
  <div class="header-actions">
    <button class="btn" onclick="showTab('team')">⚙ Team</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ New Task</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-kanban" onclick="showTab('kanban')">Kanban</button>
  <button class="tab" id="tab-list" onclick="showTab('list')">All Tasks</button>
  <button class="tab" id="tab-team" onclick="showTab('team')">Team</button>
</div>

<main>
  <!-- KANBAN VIEW -->
  <div id="view-kanban">
    <div class="kanban">
      <div class="column">
        <div class="col-header">
          <div class="col-title"><div class="dot dot-todo"></div> To Do</div>
          <span class="col-count" id="count-todo">0</span>
        </div>
        <div id="col-todo"></div>
      </div>
      <div class="column">
        <div class="col-header">
          <div class="col-title"><div class="dot dot-done"></div> Done</div>
          <span class="col-count" id="count-done">0</span>
        </div>
        <div id="col-done"></div>
      </div>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div id="view-list" style="display:none">
    <div class="list-filters">
      <input class="filter-input" type="text" id="search-input" placeholder="Search tasks..." oninput="renderList()">
      <select class="filter-select" id="filter-status" onchange="renderList()">
        <option value="">All statuses</option>
        <option value="todo">To Do</option>
        <option value="done">Done</option>
      </select>
      <select class="filter-select" id="filter-assignee" onchange="renderList()">
        <option value="">All members</option>
      </select>
    </div>
    <div class="list-view" id="list-container"></div>
  </div>

  <!-- TEAM VIEW -->
  <div id="view-team" style="display:none">
    <div class="settings-panel">
      <div class="settings-title">Team Members</div>
      <div class="member-list" id="member-list"></div>
      <div class="add-member-row">
        <input type="text" id="new-member-input" placeholder="Enter name..." onkeydown="if(event.key==='Enter')addMember()">
        <button class="btn-modal btn-modal-primary" onclick="addMember()">Add</button>
      </div>
    </div>
  </div>
</main>

<button class="fab" onclick="openAddModal()" title="Add task">+</button>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Task</div>
    <div class="form-group">
      <label>Task title *</label>
      <input type="text" id="f-title" placeholder="What needs to be done?">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="f-desc" placeholder="Optional details..."></textarea>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="f-status">
        <option value="todo">To Do</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div class="form-group">
      <label>Assign to</label>
      <div class="assignee-grid" id="assignee-picker"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal" onclick="closeModal()">Cancel</button>
      <button class="btn-modal btn-danger btn-sm" id="delete-btn" style="display:none" onclick="deleteTask()">Delete</button>
      <button class="btn-modal btn-modal-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script>
console.log("Supabase loaded:", window.supabase); 
if (!window.supabase) {
  alert("Supabase failed to load. Check script tag.");
}
console.log("Supabase object:", window.supabase);

const { createClient } = supabase;

const sb = createClient(
  "https://rxspfdpubsttexhggfkm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ4c3BmZHB1YnN0dGV4aGdnZmttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTczNjUsImV4cCI6MjA5NjU3MzM2NX0.18OYrv6jUErWNA8OJ5LosGMzbyzRCYH189x30F1HEcU"
);

let data = { members: [], tasks: [] };
let editingId = null;

/* ---------- HELPERS ---------- */
function initials(name) { return name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2); }
function fmtDate(iso) {
  if(!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}
function statusLabel(s) { return s==='todo' ? 'To Do' : 'Done'; }
function statusClass(s) { return s==='todo' ? 's-todo' : 's-done'; }
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ---------- LOAD DATA ---------- */
async function loadData() {
  const { data: tasksData } = await  sb.from("tasks").select("*");
  const { data: membersData } = await  sb.from("members").select("*");
  const { data: links } = await  sb.from("task_assignees").select("*");

  data.tasks = tasksData.map(t => ({
    id: t.id,
    title: t.title,
    description: t.description,
    status: t.status,
    created: t.created,
    assignees: links
      .filter(l => l.task_id === t.id)
      .map(l => l.member_name)
  }));

  data.members = membersData.map(m => m.name);

  renderAll();
}

/* ---------- RENDER (UNCHANGED) ---------- */
function renderKanban() {
  ['todo','done'].forEach(status => {
    const col = document.getElementById('col-'+status);
    const tasks = data.tasks.filter(t=>t.status===status);
    document.getElementById('count-'+status).textContent = tasks.length;

    if(!tasks.length) {
      col.innerHTML = '<div class="empty"><div class="empty-icon">○</div>No tasks here</div>';
      return;
    }

    col.innerHTML = tasks.map(t => `
      <div class="task-card${t.status==='done'?' done':''}" onclick="openEditModal('${t.id}')">
        <button class="check-btn" onclick="event.stopPropagation();toggleDone('${t.id}')"
        title="${t.status==='done'?'Mark not done':'Mark done'}">✓</button>

        <div class="task-title">${escHtml(t.title)}</div>

        <div class="task-meta">
          ${(t.assignees||[]).map(a=>
            `<div class="assignee-bubble" title="${escHtml(a)}">${initials(a)}</div>`
          ).join('')}
          <span class="task-date">${fmtDate(t.created)}</span>
        </div>
      </div>
    `).join('');
  });
}

function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const fs = document.getElementById('filter-status').value;
  const fa = document.getElementById('filter-assignee').value;
  const container = document.getElementById('list-container');

  let tasks = data.tasks.filter(t => {
    if(search && !t.title.toLowerCase().includes(search)) return false;
    if(fs && t.status !== fs) return false;
    if(fa && !(t.assignees||[]).includes(fa)) return false;
    return true;
  });

  if(!tasks.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">○</div>No tasks match</div>';
    return;
  }

  container.innerHTML = tasks.map(t => `
    <div class="list-item${t.status==='done'?' done':''}" onclick="openEditModal('${t.id}')">
      <button class="li-check" onclick="event.stopPropagation();toggleDone('${t.id}')" title="Toggle done">✓</button>
      <div class="li-title">${escHtml(t.title)}</div>
      <span class="li-status ${statusClass(t.status)}">${statusLabel(t.status)}</span>
      <div class="li-assignees">
        ${(t.assignees||[]).map(a=>
          `<div class="assignee-bubble" title="${escHtml(a)}">${initials(a)}</div>`
        ).join('')}
      </div>
    </div>
  `).join('');
}

function renderTeam() {
  document.getElementById('member-list').innerHTML = data.members.map(m => `
    <div class="member-row">
      <div class="member-avatar">${initials(m)}</div>
      <div class="member-name">${escHtml(m)}</div>
      <button class="btn btn-sm btn-danger" onclick="removeMember('${escHtml(m)}')">Remove</button>
    </div>
  `).join('');

  const sel = document.getElementById('filter-assignee');
  sel.innerHTML = '<option value="">All members</option>' +
    data.members.map(m=>`<option value="${escHtml(m)}">${escHtml(m)}</option>`).join('');
}

function renderAll() { renderKanban(); renderList(); renderTeam(); }

/* ---------- TASK ACTIONS ---------- */
async function toggleDone(id) {
  const t = data.tasks.find(t=>t.id===id);
  await  sb.from("tasks")
    .update({ status: t.status==='done' ? 'todo' : 'done' })
    .eq("id", id);

  loadData();
}

/* ---------- MODAL ---------- */
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-status').value = 'todo';
  buildAssigneePicker([]);
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(id) {
  const t = data.tasks.find(t=>t.id===id);
  editingId = id;
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-desc').value = t.description || '';
  document.getElementById('f-status').value = t.status;
  document.getElementById('delete-btn').style.display = 'inline-block';
  buildAssigneePicker(t.assignees);
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

/* ---------- ASSIGNEES ---------- */
function buildAssigneePicker(selected) {
  document.getElementById('assignee-picker').innerHTML = data.members.map(m => `
    <div class="assignee-chip ${(selected||[]).includes(m)?'selected':''}"
      onclick="this.classList.toggle('selected')">${escHtml(m)}</div>
  `).join('');
}

function getSelectedAssignees() {
  return [...document.querySelectorAll('.assignee-chip.selected')].map(el=>el.textContent);
}

/* ---------- SAVE TASK ---------- */
async function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if(!title) return;

  const id = editingId || Date.now().toString();

  await  sb.from("tasks").upsert({
    id,
    title,
    description: document.getElementById('f-desc').value.trim(),
    status: document.getElementById('f-status').value,
    created: new Date().toISOString()
  });

  await  sb.from("task_assignees").delete().eq("task_id", id);

  const assignees = getSelectedAssignees().map(name => ({
    task_id: id,
    member_name: name
  }));

  if (assignees.length) {
    await  sb.from("task_assignees").insert(assignees);
  }

  closeModal();
  loadData();
}

/* ---------- DELETE ---------- */
async function deleteTask() {
  if(!editingId) return;

  await  sb.from("tasks").delete().eq("id", editingId);
  await  sb.from("task_assignees").delete().eq("task_id", editingId);

  closeModal();
  loadData();
}

/* ---------- TEAM ---------- */
async function addMember() {
  const input = document.getElementById('new-member-input');
  const name = input.value.trim();
  if(!name) return;

  await  sb.from("members").insert({ name });

  input.value = '';
  loadData();
}

async function removeMember(name) {
  if(!confirm(`Remove ${name}?`)) return;

  await  sb.from("members").delete().eq("name", name);
  await  sb.from("task_assignees").delete().eq("member_name", name);

  loadData();
}

/* ---------- INIT ---------- */
loadData();
</script>
